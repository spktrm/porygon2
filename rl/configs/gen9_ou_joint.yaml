# Phase 3 — Gen 9 OU joint fine-tuning (both models train).
#
# After the builder has been bootstrapped via gen9_ou_finetune.yaml, unfreeze
# the player and let both models improve together on OU battles.
#
# A lower player learning rate is recommended to avoid undoing the strong
# randombattle policy while adapting to OU team compositions.
#
# Usage:
#   python -m rl.main --config rl/configs/gen9_ou_joint.yaml

# ---------------------------------------------------------------------------
# Format
# ---------------------------------------------------------------------------
generation: 9
smogon_format: ou   # ou | uu | ru | nu | pu | ubers | randombattle

# ---------------------------------------------------------------------------
# Checkpoint loading
# ---------------------------------------------------------------------------
# Resume from the latest OU checkpoint written during Phase 2.
load_mode: checkpoint
player_ckpt_path: ""
# Both models train; player is no longer frozen.
freeze_player: false

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
num_steps: 5000000

# ---------------------------------------------------------------------------
# Actors
# ---------------------------------------------------------------------------
num_player_actors: 12
num_builder_actors: 4
num_eval_actors: 2
unroll_length: 128

# ---------------------------------------------------------------------------
# Replay buffer
# ---------------------------------------------------------------------------
player_replay_buffer_capacity: 6144   # 1024 * 6
player_replay_ratio: 2
builder_replay_buffer_capacity: 1024
builder_replay_ratio: 5

# ---------------------------------------------------------------------------
# Self-play / league
# ---------------------------------------------------------------------------
save_interval_steps: 20000
cloud_save_interval_steps: 100000
league_winrate_log_steps: 1000
add_player_min_frames: 2000000
add_player_max_frames: 30000000
minimum_historical_player_steps: 100000
league_size: 16

# ---------------------------------------------------------------------------
# Batch
# ---------------------------------------------------------------------------
batch_size: 4

# ---------------------------------------------------------------------------
# Optimizer (AdamW)
# ---------------------------------------------------------------------------
adam:
  b1: 0.9
  b2: 0.999
  eps: 1.0e-8
  weight_decay: 0

# Lower player LR preserves the pre-trained policy while adapting to OU teams.
player_learning_rate: 1.0e-5
builder_learning_rate: 5.0e-5
player_clip_gradient: 1.0
builder_clip_gradient: 1.0
gradient_accumulation_steps: 8

# ---------------------------------------------------------------------------
# EMA target-network decay
# ---------------------------------------------------------------------------
player_ema_decay: 1.0e-3
builder_ema_decay: 1.0e-3

# ---------------------------------------------------------------------------
# Advantage / return estimation
# ---------------------------------------------------------------------------
player_td_lambda: 0.8
player_gae_lambda: 0.5
builder_td_lambda: 1.0
builder_gae_lambda: 1.0
clip_ppo: 0.3

# ---------------------------------------------------------------------------
# Loss coefficients — player
# ---------------------------------------------------------------------------
player_policy_loss_coef: 1.0
player_value_loss_coef: 1.0
player_kl_loss_coef: 0.1
player_entropy_coef: 1.0

# ---------------------------------------------------------------------------
# Loss coefficients — builder
# ---------------------------------------------------------------------------
builder_policy_loss_coef: 1.0
builder_value_loss_coef: 0.5
builder_kl_loss_coef: 0.1
builder_entropy_pred_coef: 1.0
# Increased vs. default: stronger alignment with human OU team compositions.
builder_human_loss_coef: 0.5

# ---------------------------------------------------------------------------
# Entropy temperature schedule  (coef / (step + 1)^decay, clipped to [floor, ceil])
# ---------------------------------------------------------------------------
normalising_constant: 100

player_temp_coef: 0.5
player_entropy_temp_decay: 0.3
player_entropy_temp_ceil: 0.5
player_entropy_temp_floor: 1.0e-3

builder_temp_coef: 0.1
builder_entropy_temp_decay: 0.25
builder_entropy_temp_ceil: 1.0
builder_entropy_temp_floor: 1.0e-3

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_artifacts_online: false
