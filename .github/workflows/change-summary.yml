name: Change Summary

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (inclusive) in YYYY-MM-DD format"
        required: true
        type: string
      end_date:
        description: "End date (inclusive) in YYYY-MM-DD format"
        required: true
        type: string

jobs:
  summarize:
    name: Summarize changes between ${{ inputs.start_date }} and ${{ inputs.end_date }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate change summary
        id: summary
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          # Validate date format
          if ! date -d "$START_DATE" &>/dev/null; then
            echo "::error::Invalid start_date format: '$START_DATE'. Expected YYYY-MM-DD."
            exit 1
          fi
          if ! date -d "$END_DATE" &>/dev/null; then
            echo "::error::Invalid end_date format: '$END_DATE'. Expected YYYY-MM-DD."
            exit 1
          fi

          # The end date is treated as inclusive, so advance it by one day for git's
          # --before filter (which is exclusive on the upper bound).
          AFTER="${START_DATE}T00:00:00"
          BEFORE=$(date -d "$END_DATE + 1 day" '+%Y-%m-%dT00:00:00')

          echo "Collecting commits after $AFTER and before $BEFORE …"

          # Collect commits: hash | author name | author date (ISO) | subject
          COMMITS=$(git log \
            --after="$AFTER" \
            --before="$BEFORE" \
            --format="%H|%an|%as|%s" \
            --no-merges \
            | sort -t'|' -k3 -r)   # newest first by author date

          TOTAL=$(echo "$COMMITS" | grep -c '.' || true)
          if [ -z "$COMMITS" ]; then
            TOTAL=0
          fi

          # Strip conventional-commit prefixes from a subject line and capitalise.
          # e.g. "feat(api): add endpoint" → "Add endpoint"
          clean_subject() {
            echo "$1" \
              | sed -E 's/^(feat|feature|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]*\))?!?:[[:space:]]*//' \
              | awk '{$1=toupper(substr($1,1,1))substr($1,2); print}'
          }

          # Helper: extract commits whose subject matches a prefix pattern
          filter_type() {
            local pattern="$1"
            echo "$COMMITS" | grep -iE "^\S+\|\S+\|\S+\|${pattern}" || true
          }

          # Print a section as a readable bullet list (no raw hashes shown)
          print_section() {
            local title="$1"
            local rows="$2"
            if [ -n "$rows" ]; then
              echo "### $title"
              echo ""
              while IFS='|' read -r hash author date subject; do
                [ -z "$hash" ] && continue
                desc=$(clean_subject "$subject")
                echo "- **$desc** — $date, by $author"
              done <<< "$rows"
              echo ""
            fi
          }

          # ── build the Markdown report ────────────────────────────────────────────
          {
            echo "# 📋 Update Summary: $START_DATE to $END_DATE"
            echo ""
            echo "> **Project:** ${{ github.repository }}  "
            echo "> **Report generated:** $(date -u '+%B %-d, %Y at %H:%M UTC')"
            echo ""
            echo "---"
            echo ""

            if [ "$TOTAL" -eq 0 ]; then
              echo "> ℹ️ No updates were made during this period."
            else

              # Human-friendly intro
              echo "This report summarises the **$TOTAL update(s)** made to the project"
              echo "between **$START_DATE** and **$END_DATE**."
              echo ""

              # ── Grouped sections ─────────────────────────────────────────────────
              FEAT=$(filter_type     "(feat|feature)(\(.+\))?[!]?:")
              FIX=$(filter_type      "fix(\(.+\))?[!]?:")
              PERF=$(filter_type     "perf(\(.+\))?[!]?:")
              DOCS=$(filter_type     "docs(\(.+\))?[!]?:")
              UNDER_HOOD=$(filter_type "(style|refactor|test|build|ci|chore|revert)(\(.+\))?[!]?:")

              # Collect commits not matching any known prefix
              MATCHED_HASHES=$(echo -e "$FEAT\n$FIX\n$PERF\n$DOCS\n$UNDER_HOOD" \
                | grep -o '^[0-9a-f]\{40\}' || true)

              OTHER=""
              while IFS='|' read -r hash author date subject; do
                [ -z "$hash" ] && continue
                if ! echo "$MATCHED_HASHES" | grep -q "^${hash}$"; then
                  OTHER="${OTHER}${hash}|${author}|${date}|${subject}"$'\n'
                fi
              done <<< "$COMMITS"
              OTHER="${OTHER%$'\n'}"

              echo "## What's New"
              echo ""

              print_section "🚀 New Features & Improvements" "$FEAT"
              print_section "🐛 Problems Fixed"             "$FIX"
              print_section "⚡ Performance Improvements"   "$PERF"
              print_section "📚 Documentation Updates"      "$DOCS"
              print_section "📝 Other Updates"              "$OTHER"
              print_section "🔧 Under the Hood"             "$UNDER_HOOD"

              # ── Contributors ─────────────────────────────────────────────────────
              echo "## 👥 Team Members Who Contributed"
              echo ""
              echo "$COMMITS" \
                | awk -F'|' 'NF>=2 {print $2}' \
                | sort | uniq -c | sort -rn \
                | awk '{
                    count = $1
                    $1 = ""
                    name = substr($0, 2)
                    plural = (count == 1) ? "update" : "updates"
                    printf "- **%s** — %d %s\n", name, count, plural
                  }' \
                || true
              echo ""

            fi

            echo "---"
            echo "_Generated by the [Change Summary workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/change-summary.yml)._"

          } | tee "$GITHUB_STEP_SUMMARY" | tee /tmp/pr-body.md > /dev/null

          # ── Emit outputs for the PR step ─────────────────────────────────────────
          # Last commit strictly before the start date (PR base – the "before" state)
          BASE_SHA=$(git log --before="$AFTER" --format="%H" -1 || true)
          # Last commit at or before the end date (PR head – the "after" state)
          HEAD_SHA=$(git log --before="$BEFORE" --format="%H" -1 || true)

          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          if [ "$TOTAL" -gt 0 ] && [ -n "$BASE_SHA" ] && [ -n "$HEAD_SHA" ] && [ "$BASE_SHA" != "$HEAD_SHA" ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR and request Copilot review
        if: steps.summary.outputs.has_commits == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          BASE_SHA: ${{ steps.summary.outputs.base_sha }}
          HEAD_SHA: ${{ steps.summary.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          BASE_BRANCH="change-summary/base-${START_DATE}"
          HEAD_BRANCH="change-summary/${START_DATE}-to-${END_DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create (or reset) the two boundary branches and push them
          git branch -f "$BASE_BRANCH" "$BASE_SHA"
          git branch -f "$HEAD_BRANCH" "$HEAD_SHA"
          git push origin "$BASE_BRANCH" --force
          git push origin "$HEAD_BRANCH" --force

          # Create the PR; skip gracefully if one already exists for this head branch
          PR_URL=$(gh pr create \
            --base "$BASE_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "Changes: ${START_DATE} → ${END_DATE}" \
            --body-file /tmp/pr-body.md \
            --repo "$REPO" 2>/dev/null || true)

          if [ -z "$PR_URL" ]; then
            # PR may already exist – look it up
            PR_URL=$(gh pr list \
              --head "$HEAD_BRANCH" \
              --base "$BASE_BRANCH" \
              --repo "$REPO" \
              --json url \
              --jq '.[0].url' 2>/dev/null || true)
          fi

          if [ -z "$PR_URL" ]; then
            echo "::warning::Could not create or find a PR for ${HEAD_BRANCH} → ${BASE_BRANCH}. Skipping Copilot review request."
            exit 0
          fi

          echo "PR: $PR_URL"
          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]\+$')

          # Request Copilot as a reviewer
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            --field "reviewers[]=copilot-pull-request-reviewer" \
          && echo "Copilot review requested on PR #${PR_NUMBER}." \
          || echo "::warning::Could not request Copilot review (feature may not be enabled for this repository)."
