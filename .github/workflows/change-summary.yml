name: Change Summary

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (inclusive) in YYYY-MM-DD format"
        required: true
        type: string
      end_date:
        description: "End date (inclusive) in YYYY-MM-DD format"
        required: true
        type: string

jobs:
  summarize:
    name: Summarize changes between ${{ inputs.start_date }} and ${{ inputs.end_date }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate change summary
        env:
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          # Validate date format
          if ! date -d "$START_DATE" &>/dev/null; then
            echo "::error::Invalid start_date format: '$START_DATE'. Expected YYYY-MM-DD."
            exit 1
          fi
          if ! date -d "$END_DATE" &>/dev/null; then
            echo "::error::Invalid end_date format: '$END_DATE'. Expected YYYY-MM-DD."
            exit 1
          fi

          # The end date is treated as inclusive, so advance it by one day for git's
          # --before filter (which is exclusive on the upper bound).
          AFTER="${START_DATE}T00:00:00"
          BEFORE=$(date -d "$END_DATE + 1 day" '+%Y-%m-%dT00:00:00')

          echo "Collecting commits after $AFTER and before $BEFORE …"

          # Collect commits: hash | author name | author date (ISO) | subject
          COMMITS=$(git log \
            --after="$AFTER" \
            --before="$BEFORE" \
            --format="%H|%an|%as|%s" \
            --no-merges \
            | sort -t'|' -k3 -r)   # newest first by author date

          MERGE_COMMITS=$(git log \
            --after="$AFTER" \
            --before="$BEFORE" \
            --format="%H|%an|%as|%s" \
            --merges \
            | sort -t'|' -k3 -r)

          TOTAL=$(echo "$COMMITS" | grep -c '.' || true)
          TOTAL_MERGES=$(echo "$MERGE_COMMITS" | grep -c '.' || true)
          if [ -z "$COMMITS" ]; then
            TOTAL=0
          fi
          if [ -z "$MERGE_COMMITS" ]; then
            TOTAL_MERGES=0
          fi

          # Helper: extract commits whose subject matches a prefix pattern
          filter_type() {
            local pattern="$1"
            echo "$COMMITS" | grep -iE "^\S+\|\S+\|\S+\|${pattern}" || true
          }

          format_rows() {
            while IFS='|' read -r hash author date subject; do
              [ -z "$hash" ] && continue
              short="${hash:0:7}"
              echo "| \`$short\` | $date | $author | $subject |"
            done
          }

          # ── build the Markdown report ────────────────────────────────────────────
          {
            echo "# 📋 Change Summary: $START_DATE → $END_DATE"
            echo ""
            echo "> **Repository:** \`${{ github.repository }}\`  "
            echo "> **Branch / ref:** \`${{ github.ref_name }}\`  "
            echo "> **Generated:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "---"
            echo ""
            echo "## 📊 Overview"
            echo ""
            echo "| Metric | Count |"
            echo "| --- | --- |"
            echo "| Non-merge commits | $TOTAL |"
            echo "| Merge commits | $TOTAL_MERGES |"
            echo ""

            if [ "$TOTAL" -eq 0 ] && [ "$TOTAL_MERGES" -eq 0 ]; then
              echo "> ℹ️ No commits found in the specified date range."
            else

              # ── Grouped sections (conventional commits) ─────────────────────────
              print_section() {
                local title="$1"
                local rows="$2"
                if [ -n "$rows" ]; then
                  echo "## $title"
                  echo ""
                  echo "| Commit | Date | Author | Description |"
                  echo "| --- | --- | --- | --- |"
                  echo "$rows" | format_rows
                  echo ""
                fi
              }

              FEAT=$(filter_type   "(feat|feature)(\(.+\))?[!]?:")
              FIX=$(filter_type    "fix(\(.+\))?[!]?:")
              DOCS=$(filter_type   "docs(\(.+\))?[!]?:")
              STYLE=$(filter_type  "style(\(.+\))?[!]?:")
              REFACTOR=$(filter_type "refactor(\(.+\))?[!]?:")
              PERF=$(filter_type   "perf(\(.+\))?[!]?:")
              TEST=$(filter_type   "test(\(.+\))?[!]?:")
              BUILD=$(filter_type  "(build|ci|chore)(\(.+\))?[!]?:")
              REVERT=$(filter_type "revert(\(.+\))?[!]?:")

              # Collect commits that didn't match any conventional prefix
              MATCHED_HASHES=$(echo -e "$FEAT\n$FIX\n$DOCS\n$STYLE\n$REFACTOR\n$PERF\n$TEST\n$BUILD\n$REVERT" \
                | grep -o '^[0-9a-f]\{40\}' || true)

              OTHER=""
              while IFS='|' read -r hash author date subject; do
                [ -z "$hash" ] && continue
                if ! echo "$MATCHED_HASHES" | grep -q "^${hash}$"; then
                  OTHER="${OTHER}${hash}|${author}|${date}|${subject}"$'\n'
                fi
              done <<< "$COMMITS"
              OTHER="${OTHER%$'\n'}"

              print_section "✨ Features"           "$FEAT"
              print_section "🐛 Bug Fixes"          "$FIX"
              print_section "⚡ Performance"        "$PERF"
              print_section "♻️ Refactoring"         "$REFACTOR"
              print_section "📚 Documentation"      "$DOCS"
              print_section "🎨 Style / Formatting" "$STYLE"
              print_section "🧪 Tests"              "$TEST"
              print_section "🔧 Build / CI / Chore" "$BUILD"
              print_section "⏪ Reverts"            "$REVERT"
              print_section "📝 Other Changes"      "$OTHER"

              # ── Merge commits ────────────────────────────────────────────────────
              if [ "$TOTAL_MERGES" -gt 0 ]; then
                echo "## 🔀 Merge Commits"
                echo ""
                echo "| Commit | Date | Author | Description |"
                echo "| --- | --- | --- | --- |"
                echo "$MERGE_COMMITS" | format_rows
                echo ""
              fi

              # ── Contributors ─────────────────────────────────────────────────────
              echo "## 👥 Contributors"
              echo ""
              { echo "$COMMITS"; echo "$MERGE_COMMITS"; } \
                | awk -F'|' 'NF>=2 {print $2}' \
                | sort | uniq -c | sort -rn \
                | awk '{printf "- **%s** — %d commit(s)\n", $2, $1}' \
                || true
              echo ""

            fi

            echo "---"
            echo "_Generated by the [Change Summary workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/change-summary.yml)._"

          } | tee "$GITHUB_STEP_SUMMARY"
